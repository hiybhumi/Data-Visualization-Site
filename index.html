<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Volume Dashboard</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Papa Parse for reading Kaggle CSV -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
    <h1>🚦 Real-Time Traffic Volume Dashboard</h1>
</header>

<section class="cards">

    <div class="card">
        <h3>Current Vehicles</h3>
        <h2 id="vehicles">0</h2>
    </div>

    <div class="card">
        <h3>Traffic Status</h3>
        <h2 id="status">Low</h2>
    </div>

    <div class="card">
        <h3>Average Volume</h3>
        <h2 id="average">0</h2>
    </div>

    <div class="card">
        <h3>Time</h3>
        <h2 id="time">--</h2>
    </div>

</section>

<section class="progress-section">

    <h3>Traffic Density</h3>

    <div class="progress">
        <div class="progress-fill" id="progressFill"></div>
    </div>

</section>

<section class="search">

    <input
        type="text"
        id="search"
        placeholder="Search by Date..."
    >

</section>

<section class="table-section">

<table>

<thead>

<tr>
    <th>Date</th>
    <th>Traffic Volume</th>
    <th>Status</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</section>

<footer>

<p>
Traffic Volume Dashboard 
</p>

</footer>

<script src="script.js"></script>

</body>
</html>
